name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundle: msi
          - platform: macos-latest
            bundle: dmg
          - platform: ubuntu-22.04
            bundle: appimage
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libatk1.0-dev \
            libxtst-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsystemd-dev \
            libudev-dev \
            patchelf \
            libglib2.0-dev \
            libsoup-3.0 \
            gnome-desktop3-data \
            libenchant-2-2 \
            libnotify-dev \
            libsecret-1-0 \
            libmpv-dev \
            libva-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}

      - name: Find artifacts
        shell: bash
        run: |
          find src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" \) -exec ls -lh {} \;

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 5

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 5

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 5